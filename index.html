<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Todo List</title>
  </head>
  <body>
    <h1>Todo List</h1>
    <ul class="shopping-list"></ul>

    <button id="clear">Clear <i class="fa-solid fa-eraser"></i></button>
    &nbsp;
    <button id="reset">Reset <i class="fa-solid fa-spinner"></i></button>
    <br />
    <label for="name">Enter Todo Name: </label>
    <i class="fa-solid fa-pen"></i>
    <input type="text" name="name" id="name" />
    <br />
    <label for="date">Enter Todo Date: </label>
    <i class="fa-solid fa-pen"></i>&nbsp;
    <input type="date" name="date" id="date" />
    <br />
    <label for="time">Enter Todo Time: </label>
    <i class="fa-solid fa-pen"></i>&nbsp;
    <input type="time" name="time" id="time" />

    <br />
    <button id="add">Add <i class="fa-solid fa-plus"></i></button>
    <p class="note">
      Note: clear and reset button dont keep event listeners when used.
    </p>

    <script src="script.js"></script>
    <script
      src="https://kit.fontawesome.com/86558bff2b.js"
      crossorigin="anonymous"
    ></script>
    <!--Font Awesome Kit-->
  </body>
</html>
