<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@600&family=Roboto:wght@700&display=swap"
      rel="stylesheet"
    />

    <!--Google Fonts-->
    <title>Todo List</title>
  </head>
  <body>
    <header>
      <h1>Todo List</h1>
    </header>
    <hr />
    <main>
      <ul class="todo-list"></ul>

      <button id="clear">Clear <i class="fa-solid fa-eraser"></i></button>
      &nbsp;
      <button id="reset">Reset <i class="fa-solid fa-spinner"></i></button>
      <br />
      <label for="name">Enter Todo Name: </label>
      <i class="fa-solid fa-pen"></i>
      <input type="text" name="name" id="name" required />
      <br />
      <label for="date">Enter Todo Date: </label>
      <i class="fa-solid fa-pen"></i>&nbsp;
      <input type="date" name="date" id="date" required />
      &nbsp;
      <i class="fa-regular fa-calendar-days"></i>
      <br />
      <label for="time">Enter Todo Time: </label>
      <i class="fa-solid fa-pen"></i>&nbsp;
      <input type="time" name="time" id="time" />

      <br />
      <button id="add">Add <i class="fa-solid fa-plus"></i></button>
    </main>
    <hr />
    <br />
    <footer>
      <h3>Credits</h3>

      <a href="https://fonts.google.com">Google Fonts</a>
      <br />
      <a href="https://fontawesome.com">
        Fontawesome
        <i class="fa-solid fa-font-awesome"></i>
      </a>
      <br />
      <a href="https://vscodium.com/">Built with VSCodium</a>

      <script src="script.js"></script>
      <script
        src="https://kit.fontawesome.com/86558bff2b.js"
        crossorigin="anonymous"
      ></script>
    </footer>
    <!--Font Awesome Kit-->
  </body>
</html>
