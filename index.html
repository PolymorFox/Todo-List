<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./dist/main.css" />
    <link rel="icon" href="./Images/favicon.png" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@600&family=Roboto:wght@700&display=swap"
      rel="stylesheet"
    />

    <!--Google Fonts-->
    <title>Todo List</title>
  </head>
  <body>
    <header>
      <h1>Todo List</h1>
    </header>
    <hr />
    <main>
      <h2>Your List</h2>
      <ul class="todo-list"></ul>

      <button id="clear">Clear <i class="fa-solid fa-eraser"></i></button>
      &nbsp;
      <button id="reset">Reset <i class="fa-solid fa-spinner"></i></button>
      <br />
      <label for="name">Enter Todo Name: </label>
      <input type="text" name="name" id="name" placeholder="My Todo Name" />
      &nbsp;
      <i class="fa-solid fa-pen"></i>
      <br />
      <label for="date">Enter Todo Date: </label>
      <input type="date" name="date" id="date" />
      &nbsp;
      <i class="fa-regular fa-calendar-days"></i>
      <br />
      <label for="time">Enter Todo Time: </label>
      <input type="time" name="time" id="time" placeholder="My Todo Time" />
      &nbsp;
      <i class="fa-regular fa-clock"></i>
      <br />
      <button id="add">Add <i class="fa-solid fa-plus"></i></button>
    </main>
    <hr />
    <br />
    <footer>
      <h3>Credits</h3>
      <ul class="credits">
        <li>
          <a
            href="https://fonts.google.com"
            target="_blank"
            title="I like Google Fonts"
            >Google Fonts
            <img
              src="./Images/google-fonts.png"
              alt="Google Fonts Logo"
              class="icon"
            />
          </a>
        </li>
        <li>
          <a
            href="https://fontawesome.com"
            target="_blank"
            title="I love Fontawesome"
          >
            Fontawesome
            <i class="fa-solid fa-font-awesome"></i>
          </a>
        </li>
        <li>
          <a
            href="https://vscodium.com/"
            target="_blank"
            title="I love VSCodium"
            >Built with VSCodium
            <img src="./Images/vscodium.png" alt="VSCodium logo" class="icon"
          /></a>
        </li>
      </ul>

      <script src="script.js"></script>
      <script
        src="https://kit.fontawesome.com/86558bff2b.js"
        crossorigin="anonymous"
      ></script>
    </footer>
    <!--Font Awesome Kit-->
  </body>
</html>
